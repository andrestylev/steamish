# OpenSpec Configuration — steamish
# Auto-generated by sdd-init on 2026-05-29

project: steamish
mode: openspec

context: >
  Laravel 13 + Inertia + React 18 + Bootstrap 5 Steam-like game store.
  PHP 8.3, Sanctum SPA auth, Stripe mock for checkout, Chart.js for reports.
  SQLite in-memory for testing; migrating from SQLite to PostgreSQL in prod.
  SCSS with Steam palette (Motiva Sans font). Vite build with laravel-vite-plugin.
  No CI/CD configured locally. JS is module-based (ESM).

strict_tdd: true

testing:
  runner:
    command: php artisan test
    framework: PHPUnit 12.5
  layers:
    unit: true
    integration: true    # Laravel Feature tests (HTTP + DB)
    e2e: false
  coverage:
    available: false
    command: ~           # Install pcov/xdebug + add --coverage to run
  quality:
    linter: vendor/bin/pint
    type_checker: ~      # No PHPStan/Psalm installed
    formatter: vendor/bin/pint

phases:
  proposal: openspec/changes/{change-name}/proposal.md
  spec: openspec/changes/{change-name}/specs/{domain}/spec.md
  design: openspec/changes/{change-name}/design.md
  tasks: openspec/changes/{change-name}/tasks.md
  apply: openspec/changes/{change-name}/
  verify: openspec/changes/{change-name}/verify-report.md
  archive: openspec/changes/archive/

artifacts:
  specs: openspec/specs/          # Current delta specs per domain
  changes: openspec/changes/       # Active change workspaces
  archive: openspec/changes/archive/ # Completed changes

notes:
  - spec files at openspec/specs/{domain}/spec.md are the current source of truth
  - Changes archive at openspec/changes/archive/{date}-{name}/
  - Tests use RefreshDatabase trait; DB is SQLite :memory: in test env
